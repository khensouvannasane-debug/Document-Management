<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ຄັງເອກະສານ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Lao:wght@500;600;700&family=Noto+Sans+Lao:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #E8E1CC;
    --card: #FBF8F0;
    --ink: #2B2620;
    --ink-soft: #6B6255;
    --line: #D3C9AE;
    --stamp: #B03B2A;
    --stamp-soft: #F1DAD3;
    --tab-blue: #34546B;
    --tab-blue-soft: #D8E4EA;
    --tab-grey: #5B5648;
    --tab-grey-soft: #E4E0D2;
    --gold: #A87C2A;
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(43,38,32,0.06) 1px, transparent 0);
    background-size: 14px 14px;
    color:var(--ink);
    font-family:'Noto Sans Lao','Noto Sans',sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 16px;}

  header{
    padding:28px 16px 18px;
    border-bottom:2px solid var(--ink);
    margin-bottom:20px;
    position:relative;
  }
  header .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.16em;
    color:var(--stamp);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  header h1{
    font-family:'Noto Serif Lao',serif;
    font-weight:700;
    font-size:32px;
    margin:0 0 4px;
    letter-spacing:0.01em;
  }
  header .sub{
    font-size:14px;
    color:var(--ink-soft);
  }
  header .count-badge{
    position:absolute;
    top:26px; right:16px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    border:1px solid var(--ink);
    border-radius:20px;
    padding:5px 12px;
    background:var(--card);
  }

  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .search-box{
    flex:1 1 200px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:11px 14px 11px 36px;
    border:1.5px solid var(--ink);
    border-radius:var(--radius);
    background:var(--card);
    font-family:'Noto Sans Lao',sans-serif;
    font-size:14px;
    color:var(--ink);
    outline:none;
  }
  .search-box input:focus{border-color:var(--stamp);}
  .search-box::before{
    content:"⌕";
    position:absolute;
    left:12px; top:50%;
    transform:translateY(-50%);
    font-size:16px;
    color:var(--ink-soft);
  }
  .chip-row{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    padding:9px 13px;
    border:1.5px solid var(--ink);
    border-radius:20px;
    background:var(--card);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
  }
  .chip.active{
    background:var(--ink);
    color:var(--card);
  }

  .actions-row{
    display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;
  }
  .btn{
    font-family:'Noto Sans Lao',sans-serif;
    font-size:13px;
    padding:9px 14px;
    border-radius:var(--radius);
    border:1.5px solid var(--ink);
    background:transparent;
    color:var(--ink);
    cursor:pointer;
  }
  .btn:hover{background:var(--ink); color:var(--card);}
  .btn.primary{background:var(--stamp); border-color:var(--stamp); color:#fff;}
  .btn.primary:hover{background:#8f2f21;}
  input[type=file]{display:none;}

  .grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
  }
  @media(min-width:640px){
    .grid{grid-template-columns:1fr 1fr;}
  }
  @media(min-width:960px){
    .grid{grid-template-columns:1fr 1fr 1fr;}
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 16px 14px;
    position:relative;
    box-shadow:1px 2px 0 rgba(43,38,32,0.06);
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .card:active{transform:translateY(1px);}
  .card::before{
    content:"";
    position:absolute;
    top:14px; left:-1px;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--paper);
    border:1px solid var(--line);
    box-shadow: 0 22px 0 0 var(--paper);
  }
  .card-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:8px;
    margin-bottom:10px;
    padding-left:8px;
  }
  .code{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.03em;
  }
  .cat-tab{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:3px 8px;
    border-radius:12px;
    white-space:nowrap;
  }
  .cat-pdf{background:var(--stamp-soft); color:var(--stamp);}
  .cat-other{background:var(--tab-blue-soft); color:var(--tab-blue);}
  .cat-doc,.cat-docx{background:var(--tab-blue-soft); color:var(--tab-blue);}
  .cat-xlsx,.cat-xls{background:#DCE7D6; color:#3E6B33;}
  .cat-image,.cat-img{background:#EEDFC4; color:var(--gold);}
  .cat-default{background:var(--tab-grey-soft); color:var(--tab-grey);}

  .name{
    font-family:'Noto Serif Lao',serif;
    font-weight:600;
    font-size:16.5px;
    line-height:1.4;
    padding-left:8px;
    margin-bottom:8px;
    word-break:break-word;
  }
  .desc{
    font-size:13px;
    color:var(--ink-soft);
    padding-left:8px;
    margin-bottom:10px;
    line-height:1.5;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .meta-row{
    display:flex; justify-content:space-between; align-items:center;
    padding-left:8px;
    padding-top:10px;
    border-top:1px dashed var(--line);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
  }
  .dept-tag{
    font-size:11px;
    padding-left:8px;
    margin-top:6px;
    color:var(--tab-blue);
  }
  .dept-tag::before{content:"◆ ";font-size:9px;}

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
  }
  .empty .big{font-size:38px; margin-bottom:10px;}

  /* Modal */
  .overlay{
    position:fixed; inset:0;
    background:rgba(43,38,32,0.55);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .overlay.show{display:flex;}
  @media(min-width:640px){
    .overlay{align-items:center;}
  }
  .modal{
    background:var(--card);
    width:100%;
    max-width:520px;
    border-radius:12px 12px 0 0;
    padding:24px 20px 28px;
    max-height:85vh;
    overflow-y:auto;
    border-top:3px solid var(--stamp);
  }
  @media(min-width:640px){
    .modal{border-radius:6px; border-top:3px solid var(--stamp);}
  }
  .modal .m-code{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--stamp);
    margin-bottom:6px;
  }
  .modal h2{
    font-family:'Noto Serif Lao',serif;
    font-size:22px;
    margin:0 0 14px;
    line-height:1.4;
  }
  .m-field{margin-bottom:14px;}
  .m-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .m-value{font-size:14px; line-height:1.6;}
  .m-close{
    position:sticky; top:0; float:right;
    background:none; border:none; font-size:22px;
    color:var(--ink-soft); cursor:pointer; line-height:1;
  }
  .filepath-box{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    background:var(--paper);
    padding:8px 10px;
    border-radius:4px;
    word-break:break-all;
    color:var(--ink-soft);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">ລະບົບຄຸ້ມຄອງເອກະສານ</div>
    <h1>ຄັງເອກະສານ</h1>
    <div class="sub">ຄົ້ນຫາ ແລະ ເບິ່ງລາຍລະອຽດເອກະສານທັງໝົດ</div>
    <div class="count-badge" id="countBadge">0 ລາຍການ</div>
  </header>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ຄົ້ນຫາ ຊື່, ລະຫັດ, ພະແນກ, ແທັກ...">
    </div>
  </div>
  <div class="chip-row" id="chipRow"></div>

  <div class="actions-row">
    <button class="btn" id="importBtn">⇧ ນຳເຂົ້າ JSON</button>
    <button class="btn" id="exportBtn">⇩ ສົ່ງອອກ JSON</button>
    <input type="file" id="fileInput" accept="application/json">
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="big">🗂</div>
    ບໍ່ພົບເອກະສານທີ່ຄົ້ນຫາ
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/*__DEFAULT_DATA_START__*/
const DEFAULT_DATA = {
  "documents": [
    {
      "id": "17338e5e-71a8-4a17-a3ad-4ac24d5e3850",
      "code": "DOC-2026-0003",
      "name": "ເອກະສານສຳມະໂນຄົວ",
      "category": "pdf",
      "ext": "pdf",
      "size": 854501,
      "dateISO": "2026-07-14T08:46:40.937591+00:00",
      "dept": "",
      "desc": "",
      "tags": [],
      "filePath": "c28c5cfe-269d-4d3f-a9c9-1e9302f66c20-________________.pdf"
    },
    {
      "id": "78cbbf6b-96c4-4d96-b58c-ca2fa391ac04",
      "code": "DOC-2026-0002",
      "name": "VAT_Input_and_Output_Simplified",
      "category": "pdf",
      "ext": "pdf",
      "size": 6103196,
      "dateISO": "2026-07-14T08:14:18.024542+00:00",
      "dept": "ເຄນຄຳ",
      "desc": "ບົດຮຽນກ່ຽວກັບ ອາກອນມູນຄ່າເພີ່ມ",
      "tags": [],
      "filePath": "a4f7466f-f67f-48a5-811d-7087e38bd251-VAT_Input_and_Output_Simplified.pdf"
    },
    {
      "id": "7601564a-40cb-400b-8fba-63ef89e150b9",
      "code": "DOC-2026-0001",
      "name": "index (ຟຣາຍຖານຂໍ້ມູນຄັງເອກະສານ)",
      "category": "other",
      "ext": "html",
      "size": 50698,
      "dateISO": "2026-07-14T08:09:33.003485+00:00",
      "dept": "",
      "desc": "ໄຟກ່ຽວກັບຄັງເອກະສານ ເປັນໄຟລ໌ html",
      "tags": [],
      "filePath": "01cadccd-ded1-4ade-9ebc-2f75e491cc84-index.html"
    }
  ]
};

const STORAGE_KEY = "archive_viewer_data_v1";

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return DEFAULT_DATA;
}
function saveData(data){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
}

let state = { data: loadData(), search: "", category: "ທັງໝົດ" };

function fmtSize(bytes){
  if(bytes < 1024) return bytes + " B";
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/(1024*1024)).toFixed(2) + " MB";
}
function fmtDate(iso){
  try{
    const d = new Date(iso);
    const months = ["ມ.ກ","ກ.ພ","ມ.ນ","ມ.ສ","ພ.ພ","ມິ.ຖ","ກ.ລ","ສ.ຫ","ກ.ຍ","ຕ.ລ","ພ.ຈ","ທ.ວ"];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }catch(e){ return iso; }
}
function catClass(cat){
  const c = (cat||"").toLowerCase();
  if(c==="pdf") return "cat-pdf";
  if(c==="docx"||c==="doc") return "cat-doc";
  if(c==="xlsx"||c==="xls") return "cat-xlsx";
  if(c==="image"||c==="img") return "cat-image";
  if(c==="other") return "cat-other";
  return "cat-default";
}

function getCategories(){
  const set = new Set(state.data.documents.map(d => d.category || "ອື່ນໆ"));
  return ["ທັງໝົດ", ...Array.from(set)];
}

function renderChips(){
  const chipRow = document.getElementById("chipRow");
  chipRow.innerHTML = "";
  getCategories().forEach(cat => {
    const chip = document.createElement("div");
    chip.className = "chip" + (state.category === cat ? " active" : "");
    chip.textContent = cat;
    chip.onclick = () => { state.category = cat; render(); };
    chipRow.appendChild(chip);
  });
}

function matchesSearch(doc, q){
  if(!q) return true;
  q = q.toLowerCase();
  const hay = [doc.name, doc.code, doc.dept, doc.desc, (doc.tags||[]).join(" ")]
    .join(" ").toLowerCase();
  return hay.includes(q);
}

function render(){
  renderChips();
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyState");
  grid.innerHTML = "";

  let docs = state.data.documents.slice();
  if(state.category !== "ທັງໝົດ"){
    docs = docs.filter(d => (d.category || "ອື່ນໆ") === state.category);
  }
  docs = docs.filter(d => matchesSearch(d, state.search));
  docs.sort((a,b) => new Date(b.dateISO) - new Date(a.dateISO));

  document.getElementById("countBadge").textContent = `${state.data.documents.length} ລາຍການ`;

  if(docs.length === 0){
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  docs.forEach(doc => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-top">
        <div class="code">${doc.code || ""}</div>
        <div class="cat-tab ${catClass(doc.category)}">${(doc.ext || doc.category || "").toUpperCase()}</div>
      </div>
      <div class="name">${escapeHtml(doc.name || "(ບໍ່ມີຊື່)")}</div>
      ${doc.desc ? `<div class="desc">${escapeHtml(doc.desc)}</div>` : ""}
      ${doc.dept ? `<div class="dept-tag">${escapeHtml(doc.dept)}</div>` : ""}
      <div class="meta-row">
        <span>${fmtSize(doc.size || 0)}</span>
        <span>${fmtDate(doc.dateISO)}</span>
      </div>
    `;
    card.onclick = () => openModal(doc);
    grid.appendChild(card);
  });
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function openModal(doc){
  const modal = document.getElementById("modalBody");
  modal.innerHTML = `
    <button class="m-close" id="mClose">×</button>
    <div class="m-code">${doc.code || ""}</div>
    <h2>${escapeHtml(doc.name || "(ບໍ່ມີຊື່)")}</h2>
    <div class="m-field">
      <div class="m-label">ປະເພດ</div>
      <div class="m-value"><span class="cat-tab ${catClass(doc.category)}">${(doc.category||"").toUpperCase()}</span> · ${(doc.ext||"").toUpperCase()}</div>
    </div>
    ${doc.dept ? `<div class="m-field"><div class="m-label">ພະແນກ</div><div class="m-value">${escapeHtml(doc.dept)}</div></div>` : ""}
    ${doc.desc ? `<div class="m-field"><div class="m-label">ລາຍລະອຽດ</div><div class="m-value">${escapeHtml(doc.desc)}</div></div>` : ""}
    <div class="m-field">
      <div class="m-label">ຂະໜາດໄຟລ໌</div>
      <div class="m-value">${fmtSize(doc.size || 0)}</div>
    </div>
    <div class="m-field">
      <div class="m-label">ວັນທີອັບໂຫລດ</div>
      <div class="m-value">${fmtDate(doc.dateISO)}</div>
    </div>
    ${(doc.tags && doc.tags.length) ? `<div class="m-field"><div class="m-label">ແທັກ</div><div class="m-value">${doc.tags.map(escapeHtml).join(", ")}</div></div>` : ""}
    <div class="m-field">
      <div class="m-label">ຊື່ໄຟລ໌ໃນລະບົບ</div>
      <div class="filepath-box">${escapeHtml(doc.filePath || "-")}</div>
    </div>
  `;
  document.getElementById("mClose").onclick = closeModal;
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){
  document.getElementById("overlay").classList.remove("show");
}
document.getElementById("overlay").addEventListener("click", (e) => {
  if(e.target.id === "overlay") closeModal();
});

document.getElementById("searchInput").addEventListener("input", (e) => {
  state.search = e.target.value;
  render();
});

document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("fileInput").click();
});
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try{
      const parsed = JSON.parse(ev.target.result);
      if(!parsed.documents || !Array.isArray(parsed.documents)){
        alert("ໄຟລ໌ JSON ບໍ່ຖືກຮູບແບບ (ຕ້ອງມີ documents array)");
        return;
      }
      state.data = parsed;
      state.category = "ທັງໝົດ";
      saveData(state.data);
      render();
    }catch(err){
      alert("ບໍ່ສາມາດອ່ານໄຟລ໌ JSON ໄດ້: " + err.message);
    }
  };
  reader.readAsText(file);
});

document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state.data, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = new Date().toISOString().split("T")[0];
  a.href = url;
  a.download = `ຄັງເອກະສານ-backup-${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

render();
</script>
</body>
</html>
